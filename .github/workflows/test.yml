name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    # Run every step under bash. Windows runners ship Git Bash plus preinstalled
    # jq and shellcheck, so the script and its POSIX tooling work there too.
    defaults:
      run:
        shell: bash

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y jq shellcheck

    - name: Install dependencies (macOS)
      if: matrix.os == 'macos-latest'
      run: brew install jq shellcheck

    - name: Run shellcheck
      # shellcheck is a static, OS-independent linter (already covered by the
      # Ubuntu and macOS jobs) and is not preinstalled on Windows runners. The
      # Windows job's job is to actually run the script + test suite under Git Bash.
      if: matrix.os != 'windows-latest'
      run: shellcheck --severity=warning az-reaper tests/test.sh

    - name: Run test suite
      run: |
        chmod +x tests/test.sh
        tests/test.sh

    - name: Verify script structure
      run: |
        head -n 1 az-reaper | grep -q "#!/usr/bin/env bash" || { echo "Bad shebang"; exit 1; }
        grep -q "^set -euo pipefail" az-reaper || { echo "Missing 'set -euo pipefail'"; exit 1; }
        grep -q 'VERSION=' az-reaper || { echo "Missing VERSION"; exit 1; }
        grep -q 'EXTENSION_NAME=' az-reaper || { echo "Missing EXTENSION_NAME"; exit 1; }
        grep -q "check_dependencies" az-reaper || { echo "Missing check_dependencies"; exit 1; }
        echo "All structural checks passed!"
