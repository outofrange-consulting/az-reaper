name: Azure CLI Extension

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: Engine tests (Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.9', '3.11']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Byte-compile the extension
      run: python -m py_compile azext_reaper/*.py azext_reaper/tests/*.py setup.py

    - name: Lint (flake8)
      run: |
        python -m pip install --upgrade pip flake8
        # The engine and tests must stay clean; framework glue uses az imports.
        flake8 azext_reaper --max-line-length=100 --extend-ignore=E501,W503

    - name: Run engine unit tests (azure-cli-free)
      run: python azext_reaper/tests/test_reaper_core.py -v

    - name: Build wheel
      run: |
        python -m pip install --upgrade build
        python -m build --wheel
        ls -l dist/
